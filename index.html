<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js"
  integrity="sha384-tJkjbtDbvoxO+diRuDtwRO9JXR7pjWnfjfRn5ePUpl7e7RJCxKCwwnfqUAdXh53p"
  crossorigin="anonymous"></script>

<script>
  Kakao.init('068ae0e527216dfc1c1f81089bb4ed55'); // 네 JS 키
</script>

<a id="kakao-login-btn" href="javascript:loginWithKakao()">
  <img src="https://k.kakaocdn.net/14/dn/btroDszwNrM/I6efHub1SN5KCJqLm1Ovx1/o.jpg"
    width="222" alt="카카오 로그인 버튼" />
</a>

<p id="token-result"></p>

<button class="api-btn" onclick="sendToMe()" style="visibility:hidden">
  나에게 메시지 보내기
</button>

<script>
  function loginWithKakao() {
    Kakao.Auth.authorize({
      redirectUri: 'https://junegogo0830.github.io/kakaotalk/', // ⭐ 중요: 현재 페이지로 리다이렉트
      state: 'sendme_custom',
      scope: 'talk_message'
    });
  }

  function sendToMe() {
    Kakao.API.request({
      url: '/v2/api/talk/memo/send',
      data: {
        template_id: 1420276 // 네 템플릿 ID
        // template_args는 없어도 됨 (사용자 인자 없으면)
      },
    })
    .then(function(res) {
      alert('성공: 메시지 전송됨 👍');
    })
    .catch(function(err) {
      alert('에러: ' + JSON.stringify(err));
    });
  }

  // 로그인 상태 확인
  displayToken();

  function displayToken() {
    var token = getCookie('authorize-access-token');

    if(token) {
      Kakao.Auth.setAccessToken(token);
      document.querySelector('#token-result').innerText =
        '로그인 성공 👍 이제 메시지 보낼 수 있음';
      document.querySelector('button.api-btn').style.visibility = 'visible';
    }
  }

  function getCookie(name) {
    var parts = document.cookie.split(name + '=');
    if (parts.length === 2) {
      return parts[1].split(';')[0];
    }
  }
</script>
