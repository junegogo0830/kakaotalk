<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>카카오 테스트</title>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js"></script>
</head>

<body style="text-align:center; margin-top:100px;">

<h2 id="token-result">로그인 필요</h2>

<a href="javascript:loginWithKakao()">
  <img src="https://k.kakaocdn.net/14/dn/btroDszwNrM/I6efHub1SN5KCJqLm1Ovx1/o.jpg" width="222"/>
</a>

<br><br>

<button onclick="sendToMe()" style="visibility:hidden" id="sendBtn">
  나에게 메시지 보내기
</button>

<script>
Kakao.init('068ae0e527216dfc1c1f81089bb4ed55');

// URL에서 code 확인
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');

if (code) {
  document.getElementById('token-result').innerText = '로그인 성공 👍';
  document.getElementById('sendBtn').style.visibility = 'visible';
}

function loginWithKakao() {
  Kakao.Auth.authorize({
    redirectUri: 'https://junegogo0830.github.io/kakaotalk/',
    state: 'sendme_custom',
    scope: 'talk_message'
  });
}

function sendToMe() {
  Kakao.API.request({
    url: '/v2/api/talk/memo/send',
    data: {
      template_id: 1420276
    }
  })
  .then(() => alert('전송 완료 👍'))
  .catch(err => alert(JSON.stringify(err)));
}
</script>

</body>
</html>
